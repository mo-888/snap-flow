name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- build android
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release
      - run: flutter build appbundle --release
        continue-on-error: true
      - name: Rename APK
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/*.apk out/snapflow-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: out/*.apk
          retention-days: 30

  # --------------------------------------------------------------------- build ios
  build-ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      - name: Package .app into zip
        run: |
          mkdir -p out
          cd build/ios/iphoneos
          zip -qry "$GITHUB_WORKSPACE/out/snapflow-ios-unsigned.zip" Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: out/*.zip
          retention-days: 30

  # ------------------------------------------------------------------- build linux
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev clang cmake
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - name: Package Linux bundle
        run: |
          mkdir -p out
          cd build/linux/x64/release/bundle
          zip -qry "$GITHUB_WORKSPACE/out/snapflow-linux-x64.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: out/*.zip
          retention-days: 30

  # -------------------------------------------------------------- publish release
  release:
    name: Publish to Releases
    needs: [build-android, build-ios, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find assets -type f \( -name "*.apk" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/
      # Tag push (v*): create a proper versioned Release.
      - name: Release (tagged version)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
      # Main branch push: rolling prerelease under the fixed tag "latest".
      - name: Release (rolling prerelease)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (main)
          body: |
            自动构建产物（main 分支最新提交）。
            Android APK 可直接安装；iOS 为未签名 .app（需自签或 sideload 工具）；Linux 为 x64 bundle。

            对应提交: ${{ github.sha }}
          files: release/*
          prerelease: true
          make_latest: 'false'
