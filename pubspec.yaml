name: snapflow
description: SnapFlow — turn photos into structured workflow manuals.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  image_picker: ^1.1.2
  image: ^4.2.0
  pdf: ^3.11.1
  printing: ^5.13.2
  record: ^7.0.0
  http: ^1.2.2
  uuid: ^4.4.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/templates/builtin_templates.json
    - assets/fonts/NotoSansSC-Regular.ttf
